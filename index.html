<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main>
      <section class="left-side-content">
        <label class="input-excel-container">
          <span>Carga tu archivo <b>.xlsx</b> haciendo click acá</span>
          <input type="file" id="input-excel" accept=".xlsx" />
        </label>

        <label class="input-date-container" for="input-date">
          Selecciona la fecha a evaluar
          <input type="date" id="input-date" />
        </label>

        <div class="button-container">
          <button id="button-start">Procesar archivo</button>
        </div>
        <div class="button-container">
          <button id="button-copy">Copiar datos al portapapeles</button>
        </div>
      </section>

      <textarea id="text-area" placeholder="Los resultados aparecerán aquí..."></textarea>
    </main>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="main.js" type="module"></script>
  </body>
</html>
